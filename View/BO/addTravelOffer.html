    <body>

        <div id="booktable" class="contact">
            <div class="container">
                <div class="row">
                    <div class="col-md-12">
                        <div class="titlepage">
                            <h3>Create A Virtual Activity</h3>
                        </div>
                    </div>
                </div>
                <div class="white_bg">
                    <div class="row">
    
                        <div class="col-xl-6 col-lg-6 col-md-6 col-sm-12">
                            <div class="contact">
    
                                <form>
                                    <div class="row">
                                        <div class="col-sm-12">
                                            <input class="contactus" type="text" name="Nom_createur" required minlength="3" autofocus placeholder="Nom du createur"><br>
                                        </div>
                                        <div class="col-sm-12">
                                            <input class="contactus" type="text" name="Titre" required minlength="3" autofocus placeholder="Titre"><br>
                                        </div>
                                        <div class="col-sm-12">
                                            <select class="contactus" name="type" id="type" required onchange="gererAutreType()">

                                                <option value="">-- Choisissez un type --</option>
                                                <option value="jeu">Jeu video</option>
                                                <option value="film">Soiree film</option>
                                                <option value="concert">Concert en ligne</option>
                                                <option value="discussion">Salon de discussion</option>
                                                <option value="autre">Autre</option>
                                              </select>
                                        </div>
                                        <div id="champ_autre_type" style="display: none; margin-top: 10px;">
                                                
                                            <input class="contactus" type="text" name="autre_type" id="autre_type" placeholder="Tapez votre type d'activite">
                                          </div>
                                          <script>
                                          function gererAutreType() {
                                            const select = document.getElementById("type");
                                            const champAutre = document.getElementById("champ_autre_type");
                                            if (select.value === "autre") {
                                              champAutre.style.display = "block";
                                              document.getElementById("autre_type").required = true;
                                            } else {
                                              champAutre.style.display = "none";
                                              document.getElementById("autre_type").required = false;
                                            }
                                          }
                                          </script>
                                        <!--<div class="col-sm-12">
                                            <input class="contactus" type="number" name="phone" placeholder="Phone">
                                        </div>-->
                                        <div class="col-sm-12">
                                            <label for="date_time">Date Time</label>
                                            <input class="contactus" type="date" name="Date_time" required placeholder="Date de l'activite"><br>
                                        </div>
                                        <div class="col-sm-12">
                                            <input class="contactus" type="text" name="Lien" required placeholder="Lien"><br>
                                        </div>
                                        <div class="col-sm-12">
                                            <input class="contactus" type="text" name="Plateforme" required placeholder="Plateforme"><br>
                                        </div>
                                        
                                        <div class="col-sm-12">
                                            <button class="send">Start Now</button>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                        <div class="col-xl-6 col-lg-6 col-md-6 col-sm-12">
                            <div class="rable-box">
                                <figure><img src="images/lev2.jpeg" alt="#" />
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
